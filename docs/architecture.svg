<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820" role="img" aria-labelledby="title desc">
  <title id="title">Incident Zero Stack Architecture</title>
  <desc id="desc">Browser cockpit sends incident rebuild requests to a Node API. The API normalizes alerts, computes risk, creates response tasks, writes DynamoDB-shaped records, and exports an executive handoff packet.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1b63b7"/>
    </marker>
    <style>
      .bg { fill: #eef2f6; }
      .panel { fill: #ffffff; stroke: #cfd9e4; stroke-width: 2; rx: 18; }
      .node { fill: #eaf3ff; stroke: #aac9ee; stroke-width: 2; rx: 14; }
      .store { fill: #e8f6ee; stroke: #9dd5b6; stroke-width: 2; rx: 14; }
      .gate { fill: #fff3d8; stroke: #dfc372; stroke-width: 2; rx: 14; }
      .title { fill: #17202a; font: 700 34px Arial, sans-serif; }
      .subtitle { fill: #64717f; font: 400 18px Arial, sans-serif; }
      .label { fill: #17202a; font: 700 22px Arial, sans-serif; }
      .small { fill: #435160; font: 400 16px Arial, sans-serif; }
      .tiny { fill: #64717f; font: 400 14px Arial, sans-serif; }
      .arrow { stroke: #1b63b7; stroke-width: 4; fill: none; marker-end: url(#arrow); }
      .muted-arrow { stroke: #7c8ca0; stroke-width: 3; fill: none; stroke-dasharray: 8 8; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect class="bg" x="0" y="0" width="1400" height="820"/>
  <text class="title" x="60" y="70">Incident Zero Stack Architecture</text>
  <text class="subtitle" x="60" y="104">A database-first incident response cockpit: triage, evidence, audit, updates, and handoff all become durable records.</text>

  <rect class="panel" x="54" y="138" width="1292" height="604" rx="22"/>

  <rect class="node" x="98" y="218" width="246" height="132" rx="14"/>
  <text class="label" x="126" y="262">Browser cockpit</text>
  <text class="small" x="126" y="297">Scenario controls</text>
  <text class="small" x="126" y="323">Risk inputs</text>

  <rect class="node" x="448" y="218" width="246" height="132" rx="14"/>
  <text class="label" x="479" y="262">Node API</text>
  <text class="small" x="479" y="297">/api/case</text>
  <text class="small" x="479" y="323">/api/handoff</text>

  <rect class="node" x="798" y="218" width="246" height="132" rx="14"/>
  <text class="label" x="829" y="262">Incident model</text>
  <text class="small" x="829" y="297">Normalize alert</text>
  <text class="small" x="829" y="323">Compute risk/tasks</text>

  <rect class="store" x="1098" y="196" width="196" height="176" rx="14"/>
  <text class="label" x="1125" y="242">DynamoDB</text>
  <text class="small" x="1125" y="277">PK / SK records</text>
  <text class="small" x="1125" y="303">GSI1 severity</text>
  <text class="small" x="1125" y="329">GSI2 owner work</text>

  <path class="arrow" d="M344 284 H448"/>
  <text class="tiny" x="360" y="270">rebuild case</text>
  <path class="arrow" d="M694 284 H798"/>
  <text class="tiny" x="716" y="270">derive packet</text>
  <path class="arrow" d="M1044 284 H1098"/>
  <text class="tiny" x="1050" y="270">write/read</text>

  <rect class="store" x="138" y="474" width="220" height="144" rx="14"/>
  <text class="label" x="168" y="518">Evidence</text>
  <text class="small" x="168" y="553">Confidence</text>
  <text class="small" x="168" y="579">Integrity hash</text>

  <rect class="store" x="432" y="474" width="220" height="144" rx="14"/>
  <text class="label" x="462" y="518">Tasks</text>
  <text class="small" x="462" y="553">Owner</text>
  <text class="small" x="462" y="579">SLA due time</text>

  <rect class="store" x="726" y="474" width="220" height="144" rx="14"/>
  <text class="label" x="756" y="518">Audit</text>
  <text class="small" x="756" y="553">Append-only</text>
  <text class="small" x="756" y="579">Decision trail</text>

  <rect class="store" x="1020" y="474" width="220" height="144" rx="14"/>
  <text class="label" x="1050" y="518">Handoff</text>
  <text class="small" x="1050" y="553">Markdown export</text>
  <text class="small" x="1050" y="579">Executive packet</text>

  <path class="muted-arrow" d="M921 350 C860 420 340 410 248 474"/>
  <path class="muted-arrow" d="M921 350 C895 420 586 410 542 474"/>
  <path class="muted-arrow" d="M921 350 C942 420 828 410 836 474"/>
  <path class="muted-arrow" d="M921 350 C1000 420 1090 410 1130 474"/>

  <rect class="gate" x="98" y="658" width="1196" height="54" rx="14"/>
  <text class="small" x="126" y="692">Cloud gate: local adapter is safe for review; account owner must provision the real Vercel/v0 deployment and AWS Database before public submission.</text>
</svg>
