name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Syntax check
        run: npm run check

      - name: Unit and API tests
        run: npm test

      - name: Credential shape guard
        shell: bash
        run: |
          if grep -RInE 'BEGIN (RSA |EC |OPENSSH )?PRIVATE KEY|AKIA[0-9A-Z]{16}|aws_secret_access_key[[:space:]]*=' . \
            --exclude-dir=.git \
            --exclude-dir=node_modules \
            --exclude=ci.yml; then
            echo "Repository contains a credential-shaped value."
            exit 1
          fi
